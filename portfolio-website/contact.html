<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

<div class="page">

  <h1 class="contact-title">Contact Us</h1>

  <div class="contact-box">
    <form id="contactForm">

      <input type="text" placeholder="Name" required><br><br>
      <input type="email" placeholder="Email" required><br><br>
      <input type="text" placeholder="Subject" required><br><br>
      <textarea placeholder="Message" required></textarea><br><br>

      <button type="submit">Send</button>

    </form>
  </div>

  <p id="message"></p>

  <!-- Contact Info -->
  <div class="contact-info">

    <div class="info-item">
      <img src="location.png" alt="Location">
      <span>No 7, Hatton house road,Hatton,Sri Lanka</span>
    </div>

    <div class="info-item">
      <img src="phone.png" alt="Phone">
      <a href="tel:+94 76 998 0847">+94 79 998 0847</a>
    </div>

    <div class="info-item">
      <img src="email.png" alt="Email">
      <a href="mailto:hindujennadaraja2004@gmail.com">hindujennadaraja2004@gmail.com</a>
    </div>

  </div>

  <div style="text-align:center;">
    <a href="index.html">Back to Home</a>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
